http:
  addr: ":8280"
metrics:
  addr: ":9291"
telemetry:
  otlp_endpoint: "jaeger:4317"
postgres:
  host: "postgres"
  port: 5432
  user: "postgres"
  dbname: "holdem"
  max_conns: 10
  min_conns: 2
  max_conn_idle_time: "30m"
jwt:
  issuer: "holdem-auth"
  key_id: "auth-dev-rs256-1"
  private_key_path: "config/jwt_private.pem"
  access_ttl: "15m"
  refresh_ttl: "168h"
kafka:
  brokers: ["kafka:9092"]
  user_created_topic: "user.created"
auth:
  admin_emails: []
