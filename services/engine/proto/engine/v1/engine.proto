syntax = "proto3";

package engine.v1;

option go_package = "github.com/pashathecreator/holdem/services/engine/pkg/gen/go/engine/v1;enginev1";

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "Holdem Engine API"
        version: "1.0"
        description: "Texas Hold'em game engine API"
    }
    schemes: HTTP
    consumes: "application/json"
    produces: "application/json"
};

enum Street {
    STREET_UNSPECIFIED = 0;
    STREET_PREFLOP     = 1;
    STREET_FLOP        = 2;
    STREET_TURN        = 3;
    STREET_RIVER       = 4;
    STREET_SHOWDOWN    = 5;
}

enum PlayerStatus {
    PLAYER_STATUS_UNSPECIFIED   = 0;
    PLAYER_STATUS_ACTIVE        = 1;
    PLAYER_STATUS_FOLDED        = 2;
    PLAYER_STATUS_ALL_IN        = 3;
    PLAYER_STATUS_SITTING_OUT   = 4;
}

enum ActionType {
    ACTION_TYPE_UNSPECIFIED = 0;
    ACTION_TYPE_FOLD        = 1;
    ACTION_TYPE_CHECK       = 2;
    ACTION_TYPE_CALL        = 3;
    ACTION_TYPE_RAISE       = 4;
    ACTION_TYPE_ALL_IN      = 5;
}

message Card {
    string value = 1;
}

message Player {
    string        id          = 1;
    int64         stack       = 2;
    repeated Card hole_cards  = 3;
    PlayerStatus  status      = 4;
    int64         current_bet = 5;
    int32         position    = 6;
}

message Pot {
    int64           amount   = 1;
    repeated string eligible = 2;
}

message Action {
    string     player_id = 1;
    ActionType type      = 2;
    int64      amount    = 3;
}

message GameState {
    string          id            = 1;
    string          table_id      = 2;
    repeated Player players       = 3;
    repeated Card   board         = 4;
    repeated Pot    pots          = 5;
    Street          street        = 6;
    int64           current_bet   = 7;
    int32           active_player = 8;
    int32           button        = 9;
    int64           small_blind   = 10;
    int64           big_blind     = 11;
}

message StartHandRequest {
    string          table_id    = 1;
    repeated Player players     = 2;
    int32           button      = 3;
    int64           small_blind = 4;
    int64           big_blind   = 5;
}

message StartHandResponse {
    GameState state = 1;
}

message ApplyActionRequest {
    string hand_id = 1;
    Action action  = 2;
}

message ApplyActionResponse {
    GameState state = 1;
}

message GetGameStateRequest {
    string hand_id = 1;
}

message GetGameStateResponse {
    GameState state = 1;
}

message StreamGameStateRequest {
    string hand_id = 1;
}

message StreamGameStateResponse {
    GameState state = 1;
}

service GameEngine {
    rpc StartHand(StartHandRequest) returns (StartHandResponse) {
        option (google.api.http) = {
            post: "/v1/game/start"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Start a new hand"
            tags: "Game"
        };
    }

    rpc ApplyAction(ApplyActionRequest) returns (ApplyActionResponse) {
        option (google.api.http) = {
            post: "/v1/game/{hand_id}/action"
            body: "*"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Apply player action"
            tags: "Game"
        };
    }

    rpc GetGameState(GetGameStateRequest) returns (GetGameStateResponse) {
        option (google.api.http) = {
            get: "/v1/game/{hand_id}"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Get current game state"
            tags: "Game"
        };
    }

    rpc StreamGameState(StreamGameStateRequest) returns (stream StreamGameStateResponse) {
        option (google.api.http) = {
            get: "/v1/game/{hand_id}/stream"
        };
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Stream game state updates"
            tags: "Game"
        };
    }
}
