version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: holdem
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - holdem
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d holdem"]
      interval: 5s
      timeout: 5s
      retries: 5

    

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - holdem
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - kafka
    networks:
      - holdem
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Waiting for Kafka...';

      cub kafka-ready -b kafka:9092 1 60;

      echo 'Creating Kafka topics...';

      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic hand.started --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic hand.acted --partitions 1 --replication-factor 1;
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic hand.ended --partitions 1 --replication-factor 1;

      echo 'Kafka topics created.';
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - holdem
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.4
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: analytics
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./services/analytics-ingestor/db/init:/docker-entrypoint-initdb.d
    networks:
      - holdem
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-ingestor:
    build:
      context: ./services/analytics-ingestor
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPICS: hand.started,hand.acted,hand.ended
      KAFKA_CONSUMER_GROUP: analytics-ingestor-v1
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_USERNAME: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_BATCH_SIZE: "500"
      CLICKHOUSE_FLUSH_INTERVAL: 1s
    networks:
      - holdem
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - holdem

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - holdem

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - jaeger
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./services/engine/infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - holdem

  swagger:
    image: swaggerapi/swagger-ui:latest
    ports:
      - "8082:8080"
    environment:
      SWAGGER_JSON: /docs/engine/v1/engine.swagger.json
    volumes:
      - ./services/engine/docs:/docs
    networks:
      - holdem

  migrator:
    build:
      context: ./services/engine
      dockerfile: Dockerfile.migrator
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_password
    networks:
      - holdem
    restart: "no"

  engine:
    build:
      context: ./services/engine
      dockerfile: Dockerfile.engine
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "9091:9091"
      - "8080:8080"
    secrets:
      - postgres_password
    volumes:
      - ./services/engine/config:/app/config
    networks:
      - holdem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:9090"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  postgres_password:
    environment: POSTGRES_PASSWORD

networks:
  holdem:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  clickhouse_data:
  grafana_data:
  prometheus_data:
